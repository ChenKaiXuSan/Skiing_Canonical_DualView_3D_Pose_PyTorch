# hydra config
hydra:
  run:
    dir: ${paths.log_path}
  job:
    chdir: false

# Path
paths:
  log_path: logs/unity_sam3d-body/${infer.type}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  unity:
    # video_path: /workspace/data/unity_data/Recordings

    # For action-based unity image inference (used by SAM3Dbody/main.py)
    unity_dataset_data_path: /workspace/data/skiing_unity_dataset/data
    unity_sam3d_result_root: /workspace/data/skiing_unity_dataset/sam3d_body_results

# Model
model:
  root_path: /workspace/code/ckpt/sam-3d-body-dinov3
  checkpoint_path: ${model.root_path}/model.ckpt
  mhr_path: ${model.root_path}/assets/mhr_model.pt

  # detector_name: yolov8n
  # segmentor_name: sam_vit_b
  fov_name: moge2

visualize:
  save_video: true
  plot_3d: true
  plot_2d: true
  plot_skeleton: true
  plot_skeleton_3d: true

infer:
  type: unity # video or unity
  conf_thres: 50.0
  keep_frames: true
  num_inference_steps: 4

  # Device can be an int/list (e.g. 0 or [0,1]) or "cpu"
  gpu: 0

  # Action-based parallel workers per device
  workers_per_gpu: 3

  # Multi-node sharding by action (set from PBS script)
  shard_count: 1
  shard_index: 0
